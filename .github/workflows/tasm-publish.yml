name: tasm_publish

on:
  push:
    branches:
      - develop
    paths:
      - 'oliver/lynx-tasm/package.json'
  workflow_dispatch:

jobs:
  check-version-change:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check_version.outputs.changed }}
    steps:
      - name: Download Source
        uses: actions/checkout@v4.2.2
        with:
          path: lynx

      - name: Check version changed
        id: check_version
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual trigger detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            cd $GITHUB_WORKSPACE/lynx
            git show ${{ github.event.before }}:oliver/lynx-tasm/package.json > prev_package.json
            cp oliver/lynx-tasm/package.json curr_package.json
            echo "Previous version: $prev_version"
            echo "Current version: $curr_version"
            if [[ "$prev_version" != "$curr_version" ]]; then
              echo "Push trigger detected, Version changed"
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "Version did not change"
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  tasm-linux-build:
    runs-on: ubuntu-latest
    needs: [check-version-change]
    if: ${{ needs.check-version-change.outputs.changed == 'true' }}
    steps:
      - name: Download Source
        uses: actions/checkout@v4.2.2
        with:
          path: lynx
      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: pnpm/action-setup@v4.0.0
        with:
          version: 7.33.6
      - name: Install Common Dependencies
        uses: ./lynx/.github/actions/common-deps
        with:
          cache-backend: github
          target: tasm
      - name: Build Linux Tasm
        run: |-
          cd $GITHUB_WORKSPACE/lynx
          source tools/envsetup.sh
          pushd oliver/lynx-tasm
          npm install
          npm run build:release:linux
          popd
      - name: Upload Linux Tasm Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tasm_linux
          path: lynx/oliver/lynx-tasm/build/linux/Release/lepus.node

  tasm-darwin-build:
    runs-on: macOS-latest
    needs: [check-version-change]
    if: ${{ needs.check-version-change.outputs.changed == 'true' }}
    steps:
      - name: Download Source
        uses: actions/checkout@v4.2.2
        with:
          path: lynx
      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: pnpm/action-setup@v4.0.0
        with:
          version: 7.33.6
      - name: Install Common Dependencies
        uses: ./lynx/.github/actions/common-deps
        with:
          cache-backend: github
          target: tasm
      - name: Build Darwin Tasm
        run: |-
          cd $GITHUB_WORKSPACE/lynx
          source tools/envsetup.sh
          pushd oliver/lynx-tasm
          npm install
          npm run build:release:darwin
          popd
      - name: Upload Darwin Tasm Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tasm_darwin
          path: lynx/oliver/lynx-tasm/build/darwin/Release/lepus.node

  tasm-publish:
    runs-on: macOS-latest
    needs: [tasm-linux-build, tasm-darwin-build]
    if: ${{ needs.check-version-change.outputs.changed == 'true' }}
    steps:
      - name: Download Source
        uses: actions/checkout@v4.2.2
        with:
          path: lynx
      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@v4.0.0
        with:
          version: 7.33.6
      - name: Install Common Dependencies
        uses: ./lynx/.github/actions/common-deps
        with:
          cache-backend: github
          target: tasm
      - name: Build Wasm Binary
        run: |-
          cd $GITHUB_WORKSPACE/lynx
          source tools/envsetup.sh
          pushd oliver/lynx-tasm
          npm install
          npm run build:wasm
          popd
      - name: Download Linux Tasm Artifacts
        uses: actions/download-artifact@v4
        with:
          name: tasm_linux
          path: lynx/oliver/lynx-tasm/build/linux/Release
      - name: Download Darwin Tasm Artifacts
        uses: actions/download-artifact@v4
        with:
          name: tasm_darwin
          path: lynx/oliver/lynx-tasm/build/darwin/Release
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.REPO_TASM_NPM_TOKEN }}
        run: |-
          cd $GITHUB_WORKSPACE/lynx
          source tools/envsetup.sh
          pushd oliver/lynx-tasm
          npm install
          npm run build:wasm
          npm publish --access public
          popd
